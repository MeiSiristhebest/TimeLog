
[functions.group-notifications]
enabled = true
verify_jwt = true
import_map = "./functions/group-notifications/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/group-notifications/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/group-notifications/*.html" ]

[functions.deliver-notifications]
enabled = true
verify_jwt = true
import_map = "./functions/deliver-notifications/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/deliver-notifications/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/deliver-notifications/*.html" ]

# LiveKit Token Generation (H2 AI Dialog)
[functions.livekit-token]
enabled = true
verify_jwt = false
import_map = "./functions/deno.json"
entrypoint = "./functions/livekit-token/index.ts"

# Network Quality Probe (H2 AI Dialog)
[functions.network-probe]
enabled = true
verify_jwt = false
import_map = "./functions/deno.json"
entrypoint = "./functions/network-probe/index.ts"
